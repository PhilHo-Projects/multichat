name: Deploy Multichat

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: multichat-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.SERVER_HOST }}
      DEPLOY_USER: ${{ secrets.SERVER_USER }}
      DEPLOY_PATH: /home/phil/projects/philchat/

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            webui/package-lock.json

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Install web UI dependencies
        run: npm ci --prefix webui

      - name: Run tests
        run: npm test

      - name: Lint web UI
        run: npm run lint

      - name: Build web UI
        run: npm run build
        env:
          VITE_BASE_PATH: /philchat/

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Trust deployment host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy app files
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'server/node_modules/' \
            --exclude 'webui/node_modules/' \
            --exclude 'node_modules/' \
            --exclude '.playwright-cli/' \
            --exclude 'output/' \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"

      - name: Rebuild and restart Docker container
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            set -e
            sudo cp -r '$DEPLOY_PATH'server/src/* /opt/philchat/server/src/
            sudo cp '$DEPLOY_PATH'server/package.json /opt/philchat/server/
            sudo cp '$DEPLOY_PATH'server/package-lock.json /opt/philchat/server/
            sudo cp -r '$DEPLOY_PATH'webui/dist/* /opt/philchat/webui/dist/
            cd /opt/philchat
            sudo docker build -t philchat-philchat .
            sudo docker compose down && sudo docker compose up -d
          "
